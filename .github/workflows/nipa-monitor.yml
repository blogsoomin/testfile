name: 사업공고 모니터링

on:
  schedule:
    # 매일 오전 9시 (KST) = UTC 0시
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      send_all:
        description: '현재 공고 전체 전송 (테스트용 — true 선택 시 전체 전송)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-notices:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: config.json 생성
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SEND_ALL: ${{ github.event.inputs.send_all || 'false' }}
        run: |
          python - <<'EOF'
          import json, os
          config = {
            "teams_webhook_url": os.environ["TEAMS_WEBHOOK_URL"],
            "send_all": os.environ.get("SEND_ALL", "false") == "true",
            "keywords": ["AI", "AX", "물류", "휴머노이드", "Physical"],
            "headers": {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36",
              "Accept-Language": "ko-KR,ko;q=0.9",
            },
            "max_retries": 3,
            "retry_delay": 5,
            "timeout": 15,
            "sites": [
              {
                "name": "NIPA",
                "url": "https://www.nipa.kr/biz/noticeList.do",
                "selectors": {
                  "item": "table tbody tr",
                  "title": "td.tl a",
                  "link_attr": "href",
                  "date": "span.bco"
                }
              },
              {
                "name": "KIAT",
                "url": "https://www.kiat.or.kr/front/board/boardContentsListPage.do?board_id=90&MenuId=b159c9dac684471b87256f1e25404f5e",
                "detail_url": "https://www.kiat.or.kr/front/board/boardContentsView.do?board_id=90&contents_id=",
                "selectors": {
                  "item": "table tbody tr",
                  "title": "td.td_title a",
                  "link_attr": "href",
                  "date": "td.td_app_term"
                }
              }
            ]
          }
          with open("config.json", "w", encoding="utf-8") as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
          print("config.json 생성 완료")
          EOF

      - name: seen_posts.json 복원 (이전 실행 기록)
        uses: actions/cache@v4
        with:
          path: seen_posts.json
          key: notice-seen-posts-${{ github.run_id }}
          restore-keys: |
            notice-seen-posts-

      - name: 사업공고 확인 및 Teams 알림
        run: python nipa_monitor.py

      - name: 로그 출력
        if: always()
        run: cat nipa_monitor.log || echo "로그 없음"
